services:
  db:
    image: postgis/postgis:16-3.4
    container_name: elbigotes-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elbigotes-redis
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: compose/django/Dockerfile
    container_name: elbigotes-web
    env_file:
      - .env
    command: ["/app/scripts/start-web.sh"]
    volumes:
      - .:/app
      - static_volume:/vol/web/static
      - media_volume:/vol/web/media
    ports:
      - "${WEB_HOST_BIND:-127.0.0.1}:${WEB_HOST_PORT:-18000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
        NEXT_PUBLIC_DEFAULT_LAT: ${NEXT_PUBLIC_DEFAULT_LAT}
        NEXT_PUBLIC_DEFAULT_LNG: ${NEXT_PUBLIC_DEFAULT_LNG}
        NEXT_PUBLIC_DEFAULT_ZOOM: ${NEXT_PUBLIC_DEFAULT_ZOOM}
        NEXT_PUBLIC_USE_MOCKS: ${NEXT_PUBLIC_USE_MOCKS}
    container_name: elbigotes-frontend
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started

  celery_worker:
    build:
      context: .
      dockerfile: compose/django/Dockerfile
    container_name: elbigotes-celery-worker
    env_file:
      - .env
    command: ["/app/scripts/start-celery-worker.sh"]
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_beat:
    build:
      context: .
      dockerfile: compose/django/Dockerfile
    container_name: elbigotes-celery-beat
    env_file:
      - .env
    command: ["/app/scripts/start-celery-beat.sh"]
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: elbigotes-nginx
    depends_on:
      - frontend
      - web
    ports:
      - "${NGINX_HOST_BIND:-127.0.0.1}:${NGINX_HOST_PORT:-18080}:80"
    volumes:
      - ./compose/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/vol/web/static
      - media_volume:/vol/web/media

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
